[general]
service_name = "cremind-agent"
agent_id = "cremind_agent"
agent_name = "Cremind Agent"
jwt_expiration_hours = 720
session_token_default_ttl = 3600
mcp_tool_call_timeout = 300
sqlite_db_path = "cremind.db"
profile = ""

[embedding]
enabled = false       # opt-in; setup wizard flips to true if user opts in
provider = "me5"      # "me5" | "gemma"
hf_token = ""         # required when provider = "gemma"

[vectorstore]
provider = "chroma"  # "qdrant" | "chroma"

[qdrant]
host = "localhost"
port = 6333
api_key = ""
https = false

[chroma]
mode = "persistent"       # "http" | "persistent"
host = "localhost"
port = 8000
ssl = false
api_key = ""
persist_path = ""         # mode = "persistent" only; defaults to <system_dir>/storage/chroma when blank

[llm]
# Provider and model groups are configured via the setup wizard (stored in SQLite).
# No defaults — setup must be completed first.

# ── Settings → Config defaults (per-profile, overridable in the UI) ──

[agent]
max_steps = 200
max_llm_retries = 2
reasoning_temperature = 1.0
reasoning_max_tokens = 32768
reasoning_retry = 3
steps_length = 20
enable_prompt_cache = true
replay_reasoning_steps = true     # replay each turn's tool-call/tool-result trace into later-turn history (keeps the reasoning context cache-warm)

[compaction]
enabled = true                    # summarization-based history compaction (model-driven compact_conversation tool)
# The threshold is a FRACTION of the active model's context window (from the provider
# catalog), so it auto-scales across models and leaves headroom for the response.
# Compaction is suggest-only: once the model's reported context reaches the threshold,
# the UI proposes compacting (the user clicks to run it); it is never forced.
compact_threshold_percent = 85    # suggest compaction once context reaches this % of the window
keep_recent_tokens = 12000        # after compaction, the verbatim tail kept alongside the summary
keep_recent_messages = 4          # keep at least this many recent messages out of the summary
temperature = 0.3
max_tokens = 2048                 # hard cap on the running summary's size
retry = 2

[tool_result]
enabled = true
max_tokens = 1000
preserve_recent = 1
head_tokens = 200
tail_tokens = 200

[skill_classifier]
temperature = 0.0
max_tokens = 64
retry = 2

[memory]
enabled = false                # opt-in; setup wizard offers to flip this to true. Requires [compaction] enabled — long-term memory is generated at the compaction fold.
long_term_queue_size = 20      # max long-term facts kept in the DB queue (embedding-off mode; vector mode is unlimited)
long_term_max_tokens = 50      # clip each long-term fact to this many tokens (both modes)
long_term_retrieve_limit = 10  # top-K long-term facts retrieved from the vector store for the ## Memory block (embedding-on mode)
