[provider]
name = "minimax"
display_name = "MiniMax"
base_url = "https://api.minimax.io/v1"

[[provider.auth_methods]]
id = "api_key"
label = "MiniMax API key (Global)"
hint = "Global endpoint - api.minimax.io"
instructions = "Enter your MiniMax API key (sk-api- or sk-cp- prefix). Manage keys at: https://platform.minimax.io/user-center/basic-information/interface-key"
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "MiniMax API Key", type = "string", secret = true, required = true }

[[provider.auth_methods]]
id = "api_key_cn"
label = "MiniMax API key (CN)"
hint = "CN endpoint - api.minimaxi.com"
instructions = "Enter your MiniMax CN API key (sk-api- or sk-cp- prefix). Manage keys at: https://platform.minimaxi.com/user-center/basic-information/interface-key"
kind = "api_key"

[provider.auth_methods.fields]
api_key = { description = "MiniMax API Key", type = "string", secret = true, required = true }

# Cache pricing: MiniMax bills cache reads at 0.20x the input rate and (unlike
# most OpenAI-compatible APIs) charges 1.25x for cache writes. The write rate is
# recorded for accuracy; it is currently not exercised because the OpenAI-style
# usage breakdown reports cache-creation tokens as 0.

[[models]]
id = "MiniMax-M2.7"
context_window = 1000000
display_name = "MiniMax M2.7"
supports_reasoning = true
group_hint = "high"
prompt_cache = true
input_price_per_1m = 0.30
output_price_per_1m = 1.20
cache_read_price_per_1m = 0.06    # 0.20x input
cache_write_price_per_1m = 0.375  # 1.25x input

[[models]]
id = "MiniMax-M2.5"
context_window = 1000000
display_name = "MiniMax M2.5"
supports_reasoning = true
group_hint = "high"
prompt_cache = true
input_price_per_1m = 0.12
output_price_per_1m = 0.95
cache_read_price_per_1m = 0.024   # 0.20x input
cache_write_price_per_1m = 0.15   # 1.25x input

[[models]]
id = "MiniMax-M1"
context_window = 1000000
display_name = "MiniMax M1"
supports_reasoning = true
group_hint = "high"
prompt_cache = true
input_price_per_1m = 0.40
output_price_per_1m = 1.76
cache_read_price_per_1m = 0.08    # 0.20x input
cache_write_price_per_1m = 0.50   # 1.25x input
