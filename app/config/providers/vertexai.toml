[provider]
name = "vertexai"
display_name = "Google Vertex AI"
requires_api_key = false
requires_service_account = true

[provider.config_fields]
service_account = { description = "Service Account JSON", type = "json", secret = true, required = true }
project_id = { description = "GCP Project ID", type = "string", secret = false, required = true }
location = { description = "GCP Region", type = "string", secret = false, required = false, default = "global" }

[[provider.auth_methods]]
id = "service_account"
label = "Service Account"
hint = "Use a GCP service account JSON key"
instructions = "Create a service account at https://console.cloud.google.com/iam-admin/serviceaccounts — create a key in JSON format. The service account needs the 'Vertex AI User' role."
kind = "service_account"
is_default = true

[provider.auth_methods.fields]
service_account = { description = "Service Account JSON", type = "json", secret = true, required = true }
project_id = { description = "GCP Project ID", type = "string", secret = false, required = true }
location = { description = "GCP Region", type = "string", secret = false, required = false, default = "global" }

# Cache pricing: Gemini implicit caching (2.5+) bills cached input at 0.10x the
# input rate (90% discount) with no separate cache-write fee.

[[models]]
id = "google/gemini-3.1-pro-preview"
context_window = 1048576
display_name = "Gemini 3.1 Pro"
group_hint = "high"
supports_reasoning = true
prompt_cache = true
vision = true
audio = true
input_price_per_1m = 2.00
output_price_per_1m = 12.00
reasoning_effort = ["low", "medium", "high"]
cache_read_price_per_1m = 0.20    # 0.10x input
cache_write_price_per_1m = 0.0    # no separate cache-write fee

