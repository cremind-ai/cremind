[provider]
name = "mistral"
display_name = "Mistral AI"
base_url = "https://api.mistral.ai/v1"

[[provider.auth_methods]]
id = "api_key"
label = "Mistral API key"
hint = "API key"
instructions = "Enter your Mistral API key. Manage keys at https://console.mistral.ai/api-keys"
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "Mistral API Key", type = "string", secret = true, required = true }

# Cache pricing: Mistral bills cached tokens at 0.10x the input rate (90%
# discount) with no separate cache-write fee.

[[models]]
id = "mistral-large-latest"
display_name = "Mistral Large 3"
group_hint = "high"
prompt_cache = true
vision = true
input_price_per_1m = 0.50
output_price_per_1m = 1.50
cache_read_price_per_1m = 0.05    # 0.10x input
cache_write_price_per_1m = 0.0    # no separate cache-write fee

[[models]]
id = "mistral-medium-latest"
