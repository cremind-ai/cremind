[provider]
name = "google-gemini"
display_name = "Google Gemini"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"

[[provider.auth_methods]]
id = "api_key"
label = "Google Gemini API key"
hint = "AI Studio / Gemini API key"
instructions = "Enter your Gemini API key. Get one from https://aistudio.google.com/apikey"
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "Gemini API Key", type = "string", secret = true, required = true }

# Cache pricing: Gemini implicit caching (2.5+) bills cached input at 0.10x the
# input rate (90% discount) with no separate cache-write fee.

[[models]]
id = "gemini-3.1-pro-preview"
display_name = "Gemini 3.1 Pro"
group_hint = "high"
supports_reasoning = true
prompt_cache = true
vision = true
input_price_per_1m = 2.00
output_price_per_1m = 12.00
cache_read_price_per_1m = 0.20    # 0.10x input
cache_write_price_per_1m = 0.0    # no separate cache-write fee

