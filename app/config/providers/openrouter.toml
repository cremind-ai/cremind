[provider]
name = "openrouter"
display_name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"

[[provider.auth_methods]]
id = "api_key"
label = "OpenRouter API key"
hint = "API key"
instructions = "Enter your OpenRouter API key. Manage keys at https://openrouter.ai/settings/keys — OpenRouter provides unified access to 100+ models from multiple providers."
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "OpenRouter API Key", type = "string", secret = true, required = true }

# Cache pricing mirrors each model's upstream provider economics.

[[models]]
id = "anthropic/claude-opus-4.7"
context_window = 1000000
display_name = "Claude Opus 4.7 (via OpenRouter)"
supports_reasoning = true
group_hint = "high"
prompt_cache = true
vision = true
input_price_per_1m = 5.00
output_price_per_1m = 25.00
cache_read_price_per_1m = 0.50    # Anthropic: 0.10x input
cache_write_price_per_1m = 6.25   # Anthropic: 1.25x input (5-min ephemeral)

