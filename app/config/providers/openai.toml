[provider]
name = "openai"
display_name = "OpenAI"
requires_api_key = true

[[provider.auth_methods]]
id = "api_key"
label = "API Key"
hint = "Standard OpenAI API key"
instructions = "Get your API key at https://platform.openai.com/api-keys — sign in and create a new secret key."
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "OpenAI API Key", type = "string", secret = true, required = true }

[[provider.auth_methods]]
id = "codex_oauth"
label = "Sign in with ChatGPT"
hint = "Browser sign-in with your ChatGPT account (Plus/Pro/Team)"
instructions = "Click Sign in with ChatGPT and approve access in your browser. Cremind captures the redirect on this machine (port 1455) and stores the tokens automatically. If that can't work (remote/Docker install, or port 1455 is in use), paste the full redirect URL from your browser's address bar instead. Requests then run against ChatGPT's Codex backend under your plan — a different model list from the API-key models."
kind = "oauth"
# No `fields` table: the browser flow captures the tokens; there is nothing to
# type. Tokens are stored server-side under ``openai.oauth_*`` keys.

# Cache pricing: the GPT-5 family discounts cached input to 0.10x the input rate;
# GPT-4.1 and the o-series cache at 0.25x. OpenAI does not charge separately for
# cache creation.

# parallel_tool_calls: lets the model request several tool calls in one turn (the
# agent then runs the leaf calls concurrently). Defaults to true for unflagged
# models. The listed OpenAI models accept the request parameter under tool_choice
# "auto"; set it to false to opt out a model that rejects it.

# Latest flagship models (GPT-5.4 series)
[[models]]
id = "gpt-5.4"
display_name = "GPT-5.4"
context_window = 1050000
group_hint = "high"
supports_reasoning = true
reasoning_effort = ["low", "medium", "high"]
prompt_cache = true
vision = true
parallel_tool_calls = true
# Served by both the standard API (api_key) and the ChatGPT Codex backend (codex_oauth).
auth_methods = ["api_key", "codex_oauth"]
input_price_per_1m = 2.50
output_price_per_1m = 15.00
cache_read_price_per_1m = 0.25    # 0.10x input
cache_write_price_per_1m = 0.0    # no separate cache-write fee

