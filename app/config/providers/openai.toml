# ── ChatGPT Codex models (auth_method = codex_oauth) ───────────────────────
# Served by https://chatgpt.com/backend-api/codex/responses under the signed-in
# user's ChatGPT plan (Plus/Pro/Team), NOT api.openai.com. Reached only when the
# OpenAI provider's active auth method is "Sign in with ChatGPT". Usage is
# covered by the plan, so there is NO per-token billing: price fields are
# intentionally ABSENT (cost = unknown, never a misleading $0.00 — see
# app/lib/llm/pricing.py "never silently zero"). Context windows are conservative
# published values; the reasoning loop's clip-and-retry self-corrects if off.

[[models]]
id = "gpt-5.6-sol"
display_name = "GPT 5.6 Sol"
context_window = 272000
max_output_tokens = 128000
group_hint = "high"
supports_reasoning = true
reasoning_effort = ["low", "medium", "high"]
prompt_cache = true
vision = true
auth_methods = ["codex_oauth"]

