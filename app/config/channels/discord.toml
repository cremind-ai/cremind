[channel]
type = "discord"
display_name = "Discord"
icon = "mdi:discord"
supports_bot = true
supports_userbot = true
auth_modes = ["none", "otp", "password"]
default_response_mode = "normal"
implemented = true

[[channel.modes]]
id = "bot"
label = "Bot"
implemented = true
instructions = """1. Visit https://discord.com/developers/applications and create a new application.
2. Open the Bot tab → Add Bot, then click 'Reset Token' and copy the token.
3. Under Privileged Gateway Intents, enable MESSAGE CONTENT INTENT.
4. Use OAuth2 → URL Generator to invite the bot (scopes: bot; permissions: Send Messages, Read Message History).
5. Paste the bot token below.

Direct-message the bot and the Cremind agent will reply. Server-channel
messages are ignored — this is a 1:1 DM bridge."""
[channel.modes.fields]
bot_token = { description = "Bot Token", type = "string", secret = true, required = true }

[[channel.modes]]
id = "notification"
label = "Notification"
implemented = true
instructions = """Push-only alerts — no conversation. The Discord bot forwards Cremind
notifications (automation/event runs, errors, pending prompts) to whoever
subscribes, with a configurable filter.

Setup:
1. Create a bot as in Bot mode and paste its token below.
2. Save, then DM the bot /start to subscribe (/stop to unsubscribe).
3. To alert specific users without them subscribing, put their Discord user ids
   in "Target chat ids" (comma-separated).

Access control: pick a "Subscription authentication" method — open, passcode
(/start <passcode>), one-time code (you relay a code per person), admin approval
(approve each subscriber under Settings → Channels or `cremind channels approve`),
or allowlist-only (no self-subscribe; only Target chat ids receive)."""
[channel.modes.fields]
bot_token = { description = "Bot Token", type = "string", secret = true, required = true }
target_chat_ids = { description = "Optional target user ids (comma-separated)", type = "string", required = false }
subscribe_passcode = { description = "Optional passcode; senders must /start <passcode> to subscribe", type = "string", secret = true, required = false }

[[channel.modes]]
id = "userbot"
label = "Userbot (your account)"
implemented = false
instructions = """**Not supported — use at your own risk.**

User-account automation ("selfbots") **violates Discord's Terms of
Service** and can result in your account being banned. Discord enforces
this — they detect non-official-client traffic. Only enable this if you
have read https://discord.com/terms and accept the risk to your account.

Configuration would require pasting your user authentication token,
which is also a security risk: anyone with that token has full access
to your Discord account."""
[channel.modes.fields]
user_token = { description = "User Auth Token (from browser DevTools)", type = "string", secret = true, required = true }
