[channel]
type = "whatsapp"
display_name = "WhatsApp"
icon = "mdi:whatsapp"
supports_bot = false
supports_userbot = true
auth_modes = ["none", "otp", "password"]
default_response_mode = "normal"
implemented = true

[[channel.modes]]
id = "userbot"
label = "Userbot (your account)"
setup_kind = "qr"
implemented = true
instructions = """Runs under your own WhatsApp account — pairing Cremind as a
linked device. Inbound DMs are auto-answered by the agent.

Prerequisites (one-time): install Node.js 18+ on PATH, then run
`npm install` inside `app/channels/sidecars/whatsapp/`.

1. Save the channel here, then open the Channels page (sidebar → Channels).
2. A QR code will appear; scan it with WhatsApp → Settings → Linked Devices
   → Link a Device. Pairing completes in a few seconds.
3. Pick an access-authentication method (open / passcode / one-time code /
   approval / allowlist) so only trusted senders can chat with your agent.
   With approval or allowlist you approve each sender under Settings →
   Channels (or `cremind channels approve`)."""
[channel.modes.fields]
phone = { description = "Phone (international format, e.g. +14155551212)", type = "string", required = false }

[[channel.modes]]
id = "notification"
label = "Notification"
setup_kind = "qr"
implemented = true
instructions = """Push-only alerts — no conversation. Runs under your own
WhatsApp account (linked device) and forwards Cremind notifications
(automation/event runs, errors, pending prompts) to chats you choose, with a
configurable filter.

Prerequisites (one-time): Node.js 18+ on PATH, then `npm install` inside
`app/channels/sidecars/whatsapp/`.

Setup:
1. Save the channel, open the Channels page, and scan the QR with WhatsApp →
   Linked Devices (same as Userbot pairing).
2. Put the target chat ids (JIDs, comma-separated) in "Target chat ids", or
   have a contact message the linked account /start to subscribe. Send /stop to
   unsubscribe.

Note: a profile can register only one WhatsApp channel, so choosing Notification
replaces conversational Userbot on WhatsApp for this profile.

Access control: pick a "Subscription authentication" method — open, passcode
(/start <passcode>), one-time code (you relay a code per person), admin approval
(approve each subscriber under Settings → Channels or `cremind channels approve`),
or allowlist-only (no self-subscribe; only Target chat ids receive)."""
[channel.modes.fields]
target_chat_ids = { description = "Target chat ids / JIDs (comma-separated)", type = "string", required = false }
subscribe_passcode = { description = "Optional passcode; senders must /start <passcode> to subscribe", type = "string", secret = true, required = false }
