# Default values for the Cremind chart.
# This is a YAML-formatted file. Keys map to the templates under templates/.

## @section Global

# Override the chart's computed names.
nameOverride: ""
fullnameOverride: ""
# Extra labels applied to every rendered object.
commonLabels: {}
commonAnnotations: {}

## @section Cremind image
# Reuses the published cremind/cremind-desktop image (VNC desktop + agent). The
# `tag` defaults to the chart's appVersion (the matching image tag CI pushed).
image:
  registry: docker.io
  repository: cremind/cremind-desktop
  # Leave empty to track .Chart.AppVersion (recommended). Override to pin.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

## @section Deployment
# LOCKED: single replica + shared external state. PostgreSQL holds dynamic
# config (JWT secret, LLM keys, profiles); the PVCs hold bootstrap.toml, OAuth
# tokens, per-profile files, and the wizard-installed venv. A rescheduled pod
# re-attaches both and boots straight through — no re-setup.
#
# Do NOT raise replicaCount without an RWX storage class AND solving the
# first-setup wizard race + per-pod browser state. See README "Scaling".
replicaCount: 1

# RWO volumes can attach to one node at a time; Recreate avoids the rolling-
# update multi-attach deadlock. Keep this as Recreate while replicaCount=1.
updateStrategy:
  type: Recreate

# Cremind runtime configuration → rendered into a ConfigMap and injected via
# envFrom. CRITICAL: CREMIND_DB_PROVIDER is deliberately ABSENT — setting it
# would make the server boot fully and SKIP the Setup Wizard. _helpers.tpl
# fails the render if anyone smuggles it in through extraEnv.
cremind:
  installMode: kubernetes        # -> INSTALL_MODE (external-only service modes; rejects SQLite)
  setupWizardEnv: kubernetes     # -> SETUP_WIZARD_ENV (pre-fills the kubernetes profile)
  host: "0.0.0.0"                # -> HOST
  apiPort: 1112                  # -> PORT (backend API)
  uiPort: 1515                   # -> CREMIND_UI_PORT (SPA / Setup Wizard)
  systemDir: /root/.cremind      # -> CREMIND_SYSTEM_DIR (PVC mount; image default)
  # The desktop entrypoint requires these or it exits 1. The image already
  # defaults them, but we set them explicitly so they're configurable.
  resolution: "1280x720"         # -> RESOLUTION (must match WIDTHxHEIGHT)
  vncPassword: "changeme"        # -> VNC_PASSWORD
  oauthCallbackPort: 1516        # -> CREMIND_OAUTH_CALLBACK_PORT
  # Auto-wire the PostgreSQL password into the pod (as CREMIND_POSTGRES_PASSWORD,
  # via secretKeyRef) so the Setup Wizard needs no manual credential entry —
  # like Docker mode. When postgresql.enabled (bundled), this defaults to the
  # subchart's generated Secret; leave name blank to use it. For an external
  # Postgres, set name/key to your own Secret (or leave name blank and type the
  # password in the wizard).
  postgresPasswordSecret:
    name: ""        # default: the bundled <release>-postgresql Secret when postgresql.enabled
    key: password
  # Free-form extra env. Guarded against CREMIND_DB_PROVIDER in _helpers.tpl.
  extraEnv: []
  #  - name: SOME_FLAG
  #    value: "1"

## @section Persistence
# system: CREMIND_SYSTEM_DIR — bootstrap.toml, tokens/, per-profile state.
# venv:   /opt/cremind/venv  — Python deps the Setup Wizard installs at runtime
#         (LLM SDKs, embeddings). Without this, a pod restart reverts to the
#         thin-core baseline and the agent loses its LLM SDK until re-setup.
persistence:
  system:
    enabled: true
    storageClass: ""
    accessModes: [ReadWriteOnce]
    size: 5Gi
    existingClaim: ""
    annotations: {}
  venv:
    enabled: true
    storageClass: ""
    accessModes: [ReadWriteOnce]
    size: 8Gi
    existingClaim: ""
    annotations: {}

## @section Reverse proxy (single entry point)
# An in-pod nginx sidecar presents ONE port for the whole workflow so users
# never port-forward more than one port. It routes (same origin):
#   /api, /health  -> the backend API on 1112 (REST + SSE + WebSocket)
#   /vnc/          -> noVNC (websockify on :80) — the agent's desktop, always on
#   everything else-> the SPA / Setup Wizard on 1515
# Containers in a pod share localhost, so the proxy reaches 127.0.0.1:{1112,1515,80}.
proxy:
  enabled: true
  image:
    registry: docker.io
    # Unprivileged nginx so the sidecar runs as non-root and listens on 8080.
    repository: nginxinc/nginx-unprivileged
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

## @section Service
# Exposes ONLY the reverse-proxy port — one port for UI + API + noVNC.
service:
  type: ClusterIP
  port: 80          # external Service port -> proxy container port
  annotations: {}

## @section Ingress
# One hostname for the whole workflow (UI at /, noVNC at /vnc/). Set host +
# className for your cluster.
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: cremind.local
  path: /
  pathType: Prefix
  tls: []

## @section Probes (cremind container)
# DISABLED by default — deliberately. The cremind backend is effectively a
# single process whose event loop is starved during the Setup Wizard's heavy
# one-off work (e.g. `playwright install --with-deps chromium` for the browser
# feature downloads Chromium and runs apt-get, taking minutes). With a probe on
# port 1515, that starvation reads as "dead" and Kubernetes restarts the pod
# *mid-setup*, before bootstrap.toml is even written — so setup never finishes.
#
# Two things already cover what these probes would: the nginx proxy sidecar has
# its own /healthz probe that gates pod readiness (and stays up regardless of
# what the backend is doing), and the container entrypoint runs `wait -n` so a
# genuine `cremind serve` crash exits the container and Kubernetes restarts it.
# Re-enable these only if you specifically want hang-detection, and then give
# them a grace window longer than your slowest setup (raise failureThreshold).
readinessProbe:
  enabled: false
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 30
livenessProbe:
  enabled: false
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 30

## @section Resources
# The cremind-desktop image bundles XFCE + Chrome + Python; size accordingly.
resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

## @section Pod scheduling / security
serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

## @section Autoscaling
# MUST stay disabled under the single-replica + RWO model. Enabling it would
# scale past 1 pod and deadlock on the RWO PVC. Template is a placeholder.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

## @section Bundled PostgreSQL (Bitnami subchart) — LOCKED ON
# fullnameOverride pins the Service to `cremind-postgresql` regardless of the
# Helm release name, so the static `kubernetes` setup profile's pre-filled host
# is correct. The generated password is auto-wired into the Cremind pod from
# this subchart's Secret (see cremind.postgresPasswordSecret above), so the
# wizard needs no manual credential entry.
#
# NOTE: Bitnami's free Docker Hub images moved to the frozen `bitnamilegacy`
# namespace (Aug 2025), so the chart's default PostgreSQL image may fail to
# pull. See README "Dependency availability" for the three remediations
# (external Postgres / legacy image / vendored .tgz).
postgresql:
  enabled: true
  fullnameOverride: cremind-postgresql
  auth:
    username: cremind
    database: cremind
    # password / postgresPassword: leave unset to auto-generate into the secret.
  architecture: standalone

## @section Bundled Qdrant (subchart) — OFF by default (embeddings off)
qdrant:
  enabled: false
  fullnameOverride: cremind-qdrant

## @section Bundled ChromaDB (subchart) — OFF by default (embeddings off)
chromadb:
  enabled: false
  fullnameOverride: cremind-chromadb
