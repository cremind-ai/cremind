apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cremind.fullname" . }}
  labels:
    {{- include "cremind.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  # RWO PVCs cannot multi-attach; Recreate terminates the old pod before the
  # new one binds the volume. Do not switch to RollingUpdate while replicas=1.
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "cremind.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the env ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cremind.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "cremind.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cremind
          image: {{ include "cremind.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "cremind.fullname" . }}-env
          {{- with .Values.cremind.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.cremind.apiPort }}
            - name: ui
              containerPort: {{ .Values.cremind.uiPort }}
            - name: oauth
              containerPort: {{ .Values.cremind.oauthCallbackPort }}
            {{- if .Values.service.vnc.enabled }}
            - name: novnc
              containerPort: 80
            - name: vnc
              containerPort: 5900
            {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.system.enabled }}
            - name: system
              mountPath: {{ .Values.cremind.systemDir }}
            {{- end }}
            {{- if .Values.persistence.venv.enabled }}
            # Persist the wizard-installed Python venv (LLM SDKs, embeddings) so
            # a rescheduled pod keeps working without re-running setup. The
            # entrypoint seeds this from the image baseline on first boot.
            - name: venv
              mountPath: /opt/cremind/venv
            {{- end }}
      volumes:
        {{- if .Values.persistence.system.enabled }}
        - name: system
          persistentVolumeClaim:
            claimName: {{ include "cremind.systemClaimName" . }}
        {{- end }}
        {{- if .Values.persistence.venv.enabled }}
        - name: venv
          persistentVolumeClaim:
            claimName: {{ include "cremind.venvClaimName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
