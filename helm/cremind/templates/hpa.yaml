{{- if .Values.autoscaling.enabled -}}
{{- /*
  WARNING: the chart's storage model is single-replica + ReadWriteOnce PVCs.
  Horizontal scaling past one pod requires RWX storage AND solving the
  first-setup wizard race and per-pod browser state (see README "Scaling").
  This template exists as a placeholder; enabling autoscaling without those
  changes will deadlock on the RWO PVC.
*/ -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cremind.fullname" . }}
  labels:
    {{- include "cremind.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cremind.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
