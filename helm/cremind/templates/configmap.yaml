{{- /* Fail early if CREMIND_DB_PROVIDER was smuggled into extraEnv. */ -}}
{{- include "cremind.assertNoDbProvider" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cremind.fullname" . }}-env
  labels:
    {{- include "cremind.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Runtime mode signals. INSTALL_MODE=kubernetes constrains every backing
  # service to its external (in-cluster) deployment mode and rejects SQLite;
  # SETUP_WIZARD_ENV=kubernetes pre-fills the Setup Wizard. The durable
  # DB-provider override is intentionally NOT set here so the wizard appears
  # on first boot (see _helpers.tpl assertNoDbProvider).
  INSTALL_MODE: {{ .Values.cremind.installMode | quote }}
  SETUP_WIZARD_ENV: {{ .Values.cremind.setupWizardEnv | quote }}
  HOST: {{ .Values.cremind.host | quote }}
  PORT: {{ .Values.cremind.apiPort | quote }}
  CREMIND_UI_PORT: {{ .Values.cremind.uiPort | quote }}
  CREMIND_SYSTEM_DIR: {{ .Values.cremind.systemDir | quote }}
  CREMIND_OAUTH_CALLBACK_PORT: {{ .Values.cremind.oauthCallbackPort | quote }}
  # Required by the desktop entrypoint (it exits 1 without a valid RESOLUTION).
  RESOLUTION: {{ .Values.cremind.resolution | quote }}
  VNC_PASSWORD: {{ .Values.cremind.vncPassword | quote }}
