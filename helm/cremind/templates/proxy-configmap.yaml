{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cremind.fullname" . }}-proxy
  labels:
    {{- include "cremind.labels" . | nindent 4 }}
data:
  default.conf: |
    # Single entry point for Cremind. The cremind container and this nginx
    # sidecar share the pod network namespace. The cremind app now serves the
    # SPA + API + A2A + OAuth as ONE single-origin app on 127.0.0.1:1515, so
    # nginx only needs to (a) carve out noVNC/websockify on :80 and (b) forward
    # everything else to 1515. The internal API bind (1112) is loopback-only and
    # is NOT proxied here.

    # Standard WebSocket upgrade map (http context — conf.d is included there).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen {{ .Values.proxy.port }};
        server_name _;

        # Proxy-local health for the sidecar's own probes (doesn't depend on
        # the backend being up).
        location = /healthz { return 200 "ok\n"; }

        # noVNC desktop viewer. websockify serves the noVNC web bundle (relative
        # asset paths, so they resolve under /vnc/) and the VNC WebSocket on :80.
        location = /vnc { return 302 /vnc/vnc.html; }
        location /vnc/ {
            proxy_pass http://127.0.0.1:80/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # noVNC opens its VNC WebSocket at the ROOT path /websockify (its
        # built-in default), not under /vnc/, so it needs its own route to
        # websockify. Without this the upgrade falls through to the app and the
        # viewer reports "Failed to connect to server" (close code 1006).
        location = /websockify {
            proxy_pass http://127.0.0.1:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Everything else → the single-origin cremind app on 1515: the SPA,
        # /api (REST + Server-Sent Events + the /api/processes/<pid>/ws
        # WebSocket), /health, /.well-known/agent-card.json, the OAuth callbacks,
        # and the A2A JSON-RPC POST /. Buffering off so SSE streams flow;
        # Upgrade/Connection so the PTY WebSocket and A2A message/stream work.
        location / {
            proxy_pass http://127.0.0.1:1515;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
{{- end }}
