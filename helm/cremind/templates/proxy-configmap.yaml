{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cremind.fullname" . }}-proxy
  labels:
    {{- include "cremind.labels" . | nindent 4 }}
data:
  default.conf: |
    # Single entry point for Cremind. The cremind container and this nginx
    # sidecar share the pod network namespace, so 127.0.0.1 reaches the
    # backend (1112), the SPA static listener (1515), and noVNC/websockify (80).

    # Standard WebSocket upgrade map (http context — conf.d is included there).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen {{ .Values.proxy.port }};
        server_name _;

        # Proxy-local health for the sidecar's own probes (doesn't depend on
        # the backend being up).
        location = /healthz { return 200 "ok\n"; }

        # API: REST + Server-Sent Events + the one WebSocket
        # (/api/processes/<pid>/ws). Buffering off so SSE streams flow.
        location /api/ {
            proxy_pass http://127.0.0.1:1112;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location = /health {
            proxy_pass http://127.0.0.1:1112;
            proxy_set_header Host $host;
        }

        # noVNC desktop viewer. websockify serves the noVNC web bundle (relative
        # asset paths, so they resolve under /vnc/) and the VNC WebSocket on :80.
        location = /vnc { return 302 /vnc/vnc.html; }
        location /vnc/ {
            proxy_pass http://127.0.0.1:80/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # noVNC opens its VNC WebSocket at the ROOT path /websockify (its
        # built-in default), not under /vnc/, so it needs its own route to
        # websockify. Without this the upgrade falls through to the SPA and the
        # viewer reports "Failed to connect to server" (close code 1006).
        location = /websockify {
            proxy_pass http://127.0.0.1:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # A2A agent card (and any other .well-known) live on the backend —
        # the UI's agent connection fetches /.well-known/agent-card.json here.
        location /.well-known/ {
            proxy_pass http://127.0.0.1:1112;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root is overloaded: GET / serves the SPA, but POST / is the A2A
        # JSON-RPC endpoint (the agent card advertises this as its url). Split
        # by method so both share one origin. `return 418` + error_page is the
        # safe nginx idiom for method-based routing.
        location = / {
            error_page 418 = @a2a_rpc;
            if ($request_method = POST) { return 418; }
            proxy_pass http://127.0.0.1:1515;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location @a2a_rpc {
            proxy_pass http://127.0.0.1:1112;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # A2A message/stream responses are SSE; don't buffer.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Google OAuth loopback callback for the built-in gmail/gcalendar skills.
        # Their Desktop OAuth client can only redirect to a loopback host, and
        # the chart exposes ONE port — so the skill advertises
        # http://<APP_URL>/oauth/google/callback (CREMIND_OAUTH_REDIRECT_URI,
        # set only when APP_URL is loopback) and this routes that path to the
        # in-pod persistent listener (app/api/oauth_loopback.py) over the shared
        # pod loopback. The trailing "/" on proxy_pass rewrites the upstream URI
        # to "/?<query>", which the listener serves (it only accepts root). No
        # second port-forward needed. (Ingress/non-loopback APP_URL leaves the
        # redirect var unset; the skill's manual `complete-link` paste applies.)
        location = /oauth/google/callback {
            proxy_pass http://127.0.0.1:{{ .Values.cremind.oauthCallbackPort }}/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else (assets, deep links): the SPA / Setup Wizard.
        location / {
            proxy_pass http://127.0.0.1:1515;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
{{- end }}
